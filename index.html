<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BOSH Inventory">
<meta name="theme-color" content="#0a0a09">
<title>BOSH Chemical — Inventory</title>
<style>
:root{
  --bosh-black:#0a0a09;--bosh-dark:#111110;--bosh-card:#161614;
  --bosh-card2:#1e1e1b;--bosh-card3:#252522;
  --bosh-green:#4aad2e;--bosh-green2:#3d9126;--bosh-green3:#2d6b1c;
  --bosh-silver:#c8c8c0;--bosh-white:#f0f0ec;
  --bosh-border:rgba(255,255,255,0.07);--bosh-border2:rgba(255,255,255,0.13);
  --bosh-glow:rgba(74,173,46,0.18);
  --ok-bg:rgba(74,173,46,0.15);--ok-fg:#6dd44e;
  --lo-bg:rgba(220,140,30,0.15);--lo-fg:#e8a830;
  --out-bg:rgba(210,55,55,0.15);--out-fg:#f06060;
  --blue-bg:rgba(60,120,220,0.15);--blue-fg:#70a8f0;
  --r:10px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bosh-black);color:var(--bosh-white);font-size:15px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
#login{position:fixed;inset:0;background:var(--bosh-black);display:flex;align-items:center;justify-content:center;padding:1.5rem;z-index:999}
.login-card{width:100%;max-width:340px;background:var(--bosh-card);border:1px solid var(--bosh-border2);border-radius:var(--rl);padding:2rem 1.75rem;box-shadow:0 0 60px rgba(74,173,46,0.08),0 20px 60px rgba(0,0,0,0.5)}
.login-logo{display:block;width:200px;margin:0 auto 1.25rem;filter:drop-shadow(0 2px 12px rgba(74,173,46,0.3))}
.login-divider{height:1px;background:linear-gradient(90deg,transparent,var(--bosh-green3),transparent);margin-bottom:1.25rem}
.login-card h2{font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--bosh-silver);text-align:center;margin-bottom:1.25rem;opacity:.7}
.login-card select,.login-card input{width:100%;padding:11px 14px;border-radius:var(--r);border:1px solid var(--bosh-border2);background:var(--bosh-card2);color:var(--bosh-white);font-size:15px;outline:none;margin-bottom:10px;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.login-card select:focus,.login-card input:focus{border-color:var(--bosh-green);box-shadow:0 0 0 3px var(--bosh-glow)}
.btn-signin{width:100%;padding:13px;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--bosh-green),var(--bosh-green2));color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(74,173,46,0.3);transition:all .15s}
.btn-signin:active{transform:scale(.98);opacity:.9}
.login-err{color:var(--out-fg);font-size:12.5px;text-align:center;margin-top:8px;min-height:18px}
#app{display:none;height:100%;flex-direction:column}
#app.visible{display:flex}
.hdr{background:var(--bosh-card);border-bottom:1px solid var(--bosh-border);padding:10px 14px 8px;flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-logo{height:28px;filter:drop-shadow(0 1px 6px rgba(74,173,46,0.25))}
.hdr-sep{width:1px;height:20px;background:var(--bosh-border2)}
.role-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.05em}
.pill-admin{background:rgba(60,120,220,0.2);color:var(--blue-fg);border:1px solid rgba(60,120,220,0.3)}
.pill-manager{background:rgba(220,140,30,0.2);color:var(--lo-fg);border:1px solid rgba(220,140,30,0.3)}
.pill-production{background:rgba(74,173,46,0.2);color:var(--ok-fg);border:1px solid rgba(74,173,46,0.3)}
.btn-signout{font-size:12px;color:var(--bosh-silver);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px}
.stats-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px}
.stats-row::-webkit-scrollbar{display:none}
.chip{background:var(--bosh-card2);border:1px solid var(--bosh-border);border-radius:8px;padding:5px 11px;flex-shrink:0;text-align:center}
.chip-val{font-size:14px;font-weight:700;color:var(--bosh-white)}
.chip-lbl{font-size:10px;color:var(--bosh-silver);margin-top:1px;white-space:nowrap;opacity:.6}
.chip.alert .chip-val{color:var(--out-fg)}.chip.warn .chip-val{color:var(--lo-fg)}.chip.green .chip-val{color:var(--ok-fg)}
.sync-row{display:flex;align-items:center;gap:5px;margin-top:6px;font-size:11px;color:var(--bosh-silver);opacity:.6}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .3s}
.sdot.ok{background:var(--ok-fg)}.sdot.busy{background:var(--lo-fg);animation:pulse 1s infinite}.sdot.err{background:var(--out-fg)}
.hdr-line{height:1px;margin-top:8px;background:linear-gradient(90deg,var(--bosh-green3),transparent 70%)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.bnav{display:flex;background:var(--bosh-card);border-top:1px solid var(--bosh-border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px;border:none;background:transparent;color:rgba(200,200,192,0.35);font-size:10px;font-weight:600;gap:3px;cursor:pointer;transition:color .15s;min-height:56px}
.bnav-btn .ico{font-size:19px;transition:transform .15s}
.bnav-btn.active{color:var(--bosh-green)}.bnav-btn.active .ico{transform:scale(1.12)}
.badge-dot{position:relative;display:inline-block}
.badge-dot::after{content:'';position:absolute;top:-3px;right:-4px;width:7px;height:7px;border-radius:50%;background:var(--out-fg);display:none;border:1.5px solid var(--bosh-card)}
.badge-dot.has-alerts::after{display:block}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 20px;display:none}
.page.active{display:block}
.sbar{display:flex;gap:7px;margin-bottom:11px;align-items:center}
.sbar input{flex:1;padding:9px 12px;border-radius:var(--r);border:1px solid var(--bosh-border2);background:var(--bosh-card2);color:var(--bosh-white);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
.sbar input:focus{border-color:var(--bosh-green);box-shadow:0 0 0 3px var(--bosh-glow)}
.sbar select{padding:9px 8px;border-radius:var(--r);border:1px solid var(--bosh-border2);background:var(--bosh-card2);color:var(--bosh-white);font-size:13px;outline:none;flex-shrink:0;-webkit-appearance:none}
.sbar-count{font-size:12px;color:var(--bosh-silver);flex-shrink:0;white-space:nowrap;opacity:.5}
.sec-hd{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--bosh-silver);margin:18px 0 8px;opacity:.55}
.sec-hd:first-child{margin-top:0}
.card{background:var(--bosh-card);border:1px solid var(--bosh-border);border-radius:var(--rl);overflow:hidden;margin-bottom:10px}
.item{display:flex;align-items:stretch;border-bottom:1px solid var(--bosh-border);min-height:64px;transition:background .1s}
.item:last-child{border-bottom:none}
.item-body{flex:1;padding:10px 12px;min-width:0;display:flex;flex-direction:column;justify-content:center}
.item-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--bosh-white)}
.item-sub{font-size:12px;color:var(--bosh-silver);margin-top:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;opacity:.65}
.item-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:10px 12px;gap:7px;flex-shrink:0}
.qty-big{font-size:20px;font-weight:800;line-height:1;color:var(--bosh-white)}
.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
.b-ok{background:var(--ok-bg);color:var(--ok-fg)}.b-low{background:var(--lo-bg);color:var(--lo-fg)}.b-out{background:var(--out-bg);color:var(--out-fg)}
.ctrl-row{display:flex;align-items:center;gap:5px}
.qbtn{width:30px;height:30px;border-radius:7px;border:1px solid var(--bosh-border2);background:var(--bosh-card2);color:var(--bosh-white);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s;font-weight:300}
.qbtn:active{background:var(--bosh-card3);border-color:var(--bosh-green)}.qbtn:disabled{opacity:.22;pointer-events:none}
.qval{font-size:15px;font-weight:700;min-width:50px;text-align:center;color:var(--bosh-white)}
.prod-in{width:52px;height:32px;text-align:center;border-radius:7px;border:1px solid var(--bosh-border2);background:var(--bosh-card2);color:var(--bosh-white);font-size:14px;font-weight:700}
.btn-use{height:32px;padding:0 14px;border-radius:7px;border:1px solid rgba(74,173,46,0.45);background:rgba(74,173,46,0.12);color:var(--ok-fg);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .1s}
.btn-use:active{background:rgba(74,173,46,0.28);transform:scale(.97)}
.low-stock-row{display:flex;align-items:center;gap:6px;margin-top:4px;font-size:12px;color:var(--bosh-silver);opacity:.65}
.low-stock-row input{width:64px;height:26px;border-radius:6px;border:1px solid var(--bosh-border2);background:var(--bosh-card3);color:var(--bosh-white);font-size:12px;text-align:center;padding:0 4px}
.btn-set{height:26px;padding:0 9px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bosh-border2);background:var(--bosh-card2);color:var(--bosh-silver);transition:all .1s}
.btn-set:active{border-color:var(--bosh-green);color:var(--ok-fg)}
.admin-row{display:flex;gap:6px;margin-top:5px}
.btn-sm{height:26px;padding:0 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bosh-border2);background:var(--bosh-card2);color:var(--bosh-silver);white-space:nowrap;transition:all .1s}
.btn-sm.danger{border-color:rgba(210,55,55,0.4);background:rgba(210,55,55,0.08);color:var(--out-fg)}
.add-form{background:var(--bosh-card);border:1px solid var(--bosh-border);border-top:2px solid var(--bosh-green3);border-radius:var(--rl);padding:14px;margin-top:12px}
.add-form h3{font-size:12px;font-weight:700;margin-bottom:12px;color:var(--bosh-silver);letter-spacing:.06em;text-transform:uppercase;opacity:.7}
.ff{margin-bottom:9px}
.ff label{font-size:11.5px;color:var(--bosh-silver);display:block;margin-bottom:3px;opacity:.6}
.ff input{width:100%;padding:9px 11px;border-radius:var(--r);border:1px solid var(--bosh-border2);background:var(--bosh-card2);color:var(--bosh-white);font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s}
.ff input:focus{border-color:var(--bosh-green);box-shadow:0 0 0 3px var(--bosh-glow)}
.ff-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ff-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn-add{width:100%;padding:11px;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--bosh-green),var(--bosh-green2));color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;box-shadow:0 4px 14px rgba(74,173,46,0.22);transition:all .15s}
.btn-add:active{transform:scale(.98);opacity:.9}
.log-item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:1px solid var(--bosh-border)}
.log-item:last-child{border-bottom:none}
.ldot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.lout{background:var(--lo-fg)}.lin{background:var(--ok-fg)}
.log-body{flex:1;min-width:0}
.log-main{font-size:13.5px;line-height:1.4;color:var(--bosh-white)}
.log-meta{font-size:11.5px;color:var(--bosh-silver);margin-top:3px;opacity:.45}
.empty{text-align:center;padding:3rem 1rem;color:var(--bosh-silver);font-size:14px;line-height:1.7;opacity:.4}
.spinner{width:26px;height:26px;border:2px solid var(--bosh-border2);border-top-color:var(--bosh-green);border-radius:50%;animation:spin .65s linear infinite;margin:2rem auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bosh-card2);border:1px solid var(--bosh-border2);color:var(--bosh-white);padding:9px 18px;border-radius:20px;font-size:13.5px;font-weight:600;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:999;max-width:90vw;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:900;display:none;align-items:center;justify-content:center;padding:1.5rem;backdrop-filter:blur(4px)}
#modal-overlay.open{display:flex}
.modal{background:var(--bosh-card);border-radius:var(--rl);padding:1.5rem;width:100%;max-width:300px;border:1px solid var(--bosh-border2);box-shadow:0 20px 60px rgba(0,0,0,0.7)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--bosh-white)}
.modal p{font-size:14px;color:var(--bosh-silver);margin-bottom:1.25rem;line-height:1.5;opacity:.75}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:11px;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;border:none}
.btn-cancel{background:var(--bosh-card2);color:var(--bosh-white)}
.btn-confirm-del{background:rgba(210,55,55,0.18);color:var(--out-fg);border:1px solid rgba(210,55,55,0.4) !important}
.setup-warn{background:rgba(220,140,30,0.08);border:1px solid rgba(220,140,30,0.25);border-radius:var(--r);padding:11px 13px;margin-bottom:12px;font-size:12.5px;color:var(--lo-fg);line-height:1.55}
</style>
</head>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyh56DfGpdH_GN-t9ckuHyS-RHpAezPxhDE73FBg7mwvH_EvDrdAqrXurrrZA8VXaFisQ/exec";
const PASSWORDS={admin:"admin2025",manager:"manager2025",production:"production2025"};
let role="",pw="",activePage="labels",labelSearch="",labelFilter="all";
let data={labels:[],closures:[],bags:[],boxes:[],log:[]};
let pendingDelete=null;

document.getElementById("pw-in").addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin()});

function tryLogin(){
  const r=document.getElementById("role-select").value;
  const v=document.getElementById("pw-in").value;
  if(v===PASSWORDS[r]){
    role=r;pw=v;
    document.getElementById("login").style.display="none";
    document.getElementById("app").classList.add("visible");
    applyRole();loadAll();
  }else{
    document.getElementById("login-err").textContent="Incorrect password — please try again.";
    document.getElementById("pw-in").value="";
    document.getElementById("pw-in").focus();
  }
}
function signOut(){role="";pw="";document.getElementById("app").classList.remove("visible");document.getElementById("login").style.display="flex";document.getElementById("pw-in").value="";document.getElementById("login-err").textContent="";}
function applyRole(){const p=document.getElementById("role-pill");p.textContent=role.charAt(0).toUpperCase()+role.slice(1);p.className="role-pill pill-"+role;}
function setPage(p){
  activePage=p;
  document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
  document.getElementById("page-"+p).classList.add("active");
  document.querySelectorAll(".nb").forEach(b=>b.classList.remove("active"));
  document.getElementById("nav-"+p)?.classList.add("active");
  if(p==="labels")renderLabels();
  if(p==="closures")renderSection("closures","Closures","Closures");
  if(p==="bags")renderSection("bags","Plastic Bags","Plastic_Bags");
  if(p==="boxes")renderSection("boxes","Boxes","Boxes");
  if(p==="log")renderLog();
}
function configured(){return SCRIPT_URL&&!SCRIPT_URL.includes("PASTE_YOUR");}
function sync(s,m){document.getElementById("sdot").className="sdot "+s;document.getElementById("sync-txt").textContent=m;}
async function api(params){
  if(!configured())return null;
  params.pw=pw;
  const resp=await fetch(SCRIPT_URL+"?"+new URLSearchParams(params).toString());
  return resp.json();
}
async function loadAll(){
  if(!configured()){sync("err","Script URL not set");loadOffline();return;}
  sync("busy","Loading…");
  try{const r=await api({action:"getAll"});if(r?.ok){data=r;sync("ok","Live · synced just now");renderAll();}else throw new Error(r?.error);}
  catch(e){sync("err","Can't connect — check Script URL");loadOffline();}
}

function stockStatus(qty,low){if(qty<=0)return["Out of stock","b-out"];if(qty<=low)return["Low stock","b-low"];return["In stock","b-ok"];}

function renderAll(){renderStats();if(activePage==="labels")renderLabels();if(activePage==="closures")renderSection("closures","Closures","Closures");if(activePage==="bags")renderSection("bags","Plastic Bags","Plastic_Bags");if(activePage==="boxes")renderSection("boxes","Boxes","Boxes");if(activePage==="log")renderLog();updateNavAlerts();}

function renderStats(){
  const all=[...data.labels,...data.closures,...data.bags,...data.boxes];
  const tl=data.labels.reduce((s,l)=>s+l.qty,0);
  const al=all.filter(i=>i.qty>0&&i.qty<=i.lowStock).length;
  const ou=all.filter(i=>i.qty<=0).length;
  const tp=[...data.closures,...data.bags,...data.boxes].reduce((s,i)=>s+i.qty,0);
  document.getElementById("stats-row").innerHTML=`
    <div class="chip"><div class="chip-v">${tl.toLocaleString()}</div><div class="chip-l">Labels</div></div>
    <div class="chip ${ou>0?"alert":al>0?"warn":""}"><div class="chip-v">${al+ou}</div><div class="chip-l">Alerts</div></div>
    <div class="chip"><div class="chip-v">${tp.toLocaleString()}</div><div class="chip-l">Packaging</div></div>
    <div class="chip"><div class="chip-v">45</div><div class="chip-l">SKUs</div></div>`;
}

function updateNavAlerts(){
  const secs={labels:data.labels,closures:data.closures,bags:data.bags,boxes:data.boxes};
  for(const[k,items] of Object.entries(secs)){const el=document.getElementById(k+"-alert-ico");if(el)el.classList.toggle("has-alerts",items.some(i=>i.qty<=i.lowStock));}
}

function itemHTML(item,dKey,sheetName){
  const[lbl,cls]=stockStatus(item.qty,item.lowStock);
  const isA=role==="admin",isM=role==="manager",isP=role==="production";
  const id=`${dKey}-${item.row}`;
  let ctrl=isA||isM?`<div class="ctrl-row"><button class="qbtn" onclick="chg('${sheetName}','${dKey}',${item.row},-1,'${esc(item.name)}','${esc(item.size)}')" ${item.qty<=0?"disabled":""}>−</button><span class="qval">${item.qty.toLocaleString()}</span><button class="qbtn" onclick="chg('${sheetName}','${dKey}',${item.row},1,'${esc(item.name)}','${esc(item.size)}')">+</button></div>`:`<span class="qval" style="font-size:18px">${item.qty.toLocaleString()}</span>`;
  let prod=isP?`<div class="ctrl-row"><input class="prod-in" type="number" min="1" value="1" id="pi-${id}"><button class="btn-use" onclick="useItem('${sheetName}','${dKey}',${item.row},'${esc(item.name)}','${esc(item.size)}')">Use</button></div>`:"";
  let adm=isA?`<div class="ls-row">⚠️ Alert at:<input type="number" value="${item.lowStock}" id="ls-${id}" min="0"><button class="btn-set" onclick="saveLowStock('${sheetName}','${dKey}',${item.row},'${id}')">Set</button></div><div class="admin-row"><button class="btn-del" onclick="confirmDelete('${sheetName}','${dKey}',${item.row},'${esc(item.name)}')">Remove</button></div>`:"";
  return `<div class="item"><div class="item-body"><div class="item-name">${item.name}</div><div class="item-sub"><span class="item-size">${item.size||"—"}</span><span class="badge ${cls}">${lbl}</span></div>${adm}</div><div class="item-right">${ctrl}${prod}</div></div>`;
}

function renderLabels(){
  const el=document.getElementById("page-labels");
  const q=labelSearch.toLowerCase();
  const vis=data.labels.filter(l=>{
    const ms=!q||l.name.toLowerCase().includes(q)||(l.size||"").toLowerCase().includes(q);
    const mf=labelFilter==="all"||(labelFilter==="ok"&&l.qty>l.lowStock)||(labelFilter==="low"&&l.qty>0&&l.qty<=l.lowStock)||(labelFilter==="out"&&l.qty<=0);
    return ms&&mf;
  });
  let h="";
  if(!configured())h+=`<div class="setup-banner"><strong>⚠️ Not connected to Google Sheets.</strong> Open index.html in Notepad, find https://script.google.com/macros/s/AKfycbyh56DfGpdH_GN-t9ckuHyS-RHpAezPxhDE73FBg7mwvH_EvDrdAqrXurrrZA8VXaFisQ/exec and replace with your Script URL.</div>`;
  h+=`<div class="sbar"><input placeholder="Search labels…" value="${labelSearch}" oninput="labelSearch=this.value;renderLabels()" aria-label="Search"><select onchange="labelFilter=this.value;renderLabels()" aria-label="Filter"><option value="all" ${labelFilter==="all"?"selected":""}>All</option><option value="ok" ${labelFilter==="ok"?"selected":""}>In Stock</option><option value="low" ${labelFilter==="low"?"selected":""}>Low</option><option value="out" ${labelFilter==="out"?"selected":""}>Out</option></select><span class="sbar-ct">${vis.length}/${data.labels.length}</span></div>`;
  h+=vis.length===0?`<div class="empty">No labels match your search.</div>`:`<div class="card">${vis.map(l=>itemHTML(l,"labels","Labels")).join("")}</div>`;
  if(role==="admin")h+=`<div class="add-form"><div class="af-title">Add new label</div><div class="ff"><label>Product name</label><input id="al-name" placeholder="e.g. BOSH Degreaser"></div><div class="ff-2"><div class="ff"><label>Size</label><input id="al-size" placeholder="1 Gal"></div><div class="ff"><label>Starting qty</label><input id="al-qty" type="number" min="0" placeholder="0"></div></div><div class="ff"><label>Low stock alert at</label><input id="al-low" type="number" min="0" placeholder="3500"></div><button class="btn-add" onclick="addToSheet('Labels','labels','al')">Add Label</button></div>`;
  el.innerHTML=h;
}

function renderSection(pageKey,title,sheetName){
  const el=document.getElementById("page-"+pageKey);
  const items=data[pageKey]||[];
  const pfx=pageKey.slice(0,3);
  let h=`<div class="sec-hd">${title}</div>`;
  h+=items.length===0?`<div class="empty">No items yet.</div>`:`<div class="card">${items.map(i=>itemHTML(i,pageKey,sheetName)).join("")}</div>`;
  if(role==="admin")h+=`<div class="add-form"><div class="af-title">Add to ${title}</div><div class="ff"><label>Name</label><input id="${pfx}-name" placeholder="Item name"></div><div class="ff-3"><div class="ff"><label>Size</label><input id="${pfx}-size" placeholder="e.g. 12x18"></div><div class="ff"><label>Qty</label><input id="${pfx}-qty" type="number" min="0" placeholder="0"></div><div class="ff"><label>Alert at</label><input id="${pfx}-low" type="number" min="0" placeholder="2000"></div></div><button class="btn-add" onclick="addToSheet('${sheetName}','${pageKey}','${pfx}')">Add Item</button></div>`;
  el.innerHTML=h;
}

function renderLog(){
  const el=document.getElementById("page-log");
  if(!data.log?.length){el.innerHTML=`<div class="empty">No activity logged yet.<br>Switch to Production to log usage.</div>`;return;}
  el.innerHTML=`<div class="card">${data.log.slice(0,60).map(e=>{const ts=e.time?new Date(e.time).toLocaleString():"—";return`<div class="log-item"><div class="ldot ${e.type==="out"?"lout":"lin"}"></div><div class="log-body"><div class="log-main">${e.type==="out"?"Used":"Restocked"} <strong>${Number(e.qty).toLocaleString()}</strong> × ${e.name}${e.size?" ("+e.size+")":""}</div><div class="log-meta">${ts}${e.role?" · "+e.role:""}</div></div></div>`;}).join("")}</div>`;
}

async function chg(sheetName,dKey,row,delta,name,size){
  const item=data[dKey]?.find(i=>i.row===row);
  if(item)item.qty=Math.max(0,item.qty+delta);
  renderAll();
  if(!configured()){toast("⚠️ Not saved — connect Google Sheets");return;}
  sync("busy","Saving…");
  try{await api({action:"updateQty",sheet:sheetName,row,delta});await api({action:"addLog",type:delta>0?"in":"out",name,size,qty:Math.abs(delta)});sync("ok","Saved ✓");}
  catch(e){sync("err","Save failed");}
}
async function useItem(sheetName,dKey,row,name,size){
  const n=Math.max(1,parseInt(document.getElementById(`pi-${dKey}-${row}`)?.value)||1);
  const item=data[dKey]?.find(i=>i.row===row);
  if(!item)return;
  if(item.qty<n){toast(`Only ${item.qty.toLocaleString()} left`);return;}
  item.qty-=n;renderAll();toast(`Used ${n.toLocaleString()} × ${name}`);
  if(!configured())return;
  sync("busy","Saving…");
  try{await api({action:"updateQty",sheet:sheetName,row,delta:-n});const lr=await api({action:"addLog",type:"out",name,size,qty:n});if(lr?.ok){const fr=await api({action:"getAll"});if(fr?.ok){data.log=fr.log;if(activePage==="log")renderLog();}}sync("ok","Saved ✓");}
  catch(e){sync("err","Save failed");}
}
async function saveLowStock(sheetName,dKey,row,id){
  const val=parseInt(document.getElementById("ls-"+id)?.value);
  const item=data[dKey]?.find(i=>i.row===row);
  if(isNaN(val)||!item)return;
  item.lowStock=val;renderAll();toast(`Alert set to ${val.toLocaleString()}`);
  if(!configured())return;
  sync("busy","Saving…");
  try{await api({action:"setLowStock",sheet:sheetName,row,threshold:val});sync("ok","Saved ✓");}
  catch(e){sync("err","Save failed");}
}
async function addToSheet(sheetName,dKey,pfx){
  const name=document.getElementById(pfx+"-name")?.value.trim();
  const size=document.getElementById(pfx+"-size")?.value.trim()||"";
  const qty=parseInt(document.getElementById(pfx+"-qty")?.value)||0;
  const low=parseInt(document.getElementById(pfx+"-low")?.value)||3500;
  if(!name){toast("Enter a name");return;}
  const tempRow=Date.now();
  data[dKey].push({row:tempRow,name,size,qty,lowStock:low});
  renderAll();toast(`Added "${name}"`);
  if(!configured())return;
  sync("busy","Saving…");
  try{const r=await api({action:"addItem",sheet:sheetName,name,size,qty,lowStock:low});if(r?.ok){const item=data[dKey].find(i=>i.row===tempRow);if(item)item.row=r.row;sync("ok","Saved ✓");renderAll();}}
  catch(e){sync("err","Save failed");}
}
function confirmDelete(sheetName,dKey,row,name){
  pendingDelete={sheetName,dKey,row,name};
  document.getElementById("modal-msg").textContent=`Remove "${name}" from inventory? This cannot be undone.`;
  document.getElementById("modal-confirm").onclick=doDelete;
  document.getElementById("modal-overlay").classList.add("open");
}
function closeModal(){pendingDelete=null;document.getElementById("modal-overlay").classList.remove("open");}
async function doDelete(){
  const{sheetName,dKey,row,name}=pendingDelete;
  closeModal();
  data[dKey]=data[dKey].filter(i=>i.row!==row);
  renderAll();toast(`Removed "${name}"`);
  if(!configured())return;
  sync("busy","Saving…");
  try{await api({action:"deleteItem",sheet:sheetName,row});sync("ok","Saved ✓");const fr=await api({action:"getAll"});if(fr?.ok){data=fr;renderAll();}}
  catch(e){sync("err","Save failed");}
}
function esc(s){return(s||"").replace(/'/g,"\\'").replace(/"/g,"&quot;");}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove("show"),2200);}
setInterval(()=>{if(configured()&&role&&activePage!=="log"){api({action:"getAll"}).then(r=>{if(r?.ok){data=r;renderAll();sync("ok","Live · synced just now");}}).catch(()=>{});}},45000);
</script>
